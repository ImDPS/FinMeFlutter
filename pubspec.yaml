name: finme
description: Personal finance tracker — India, INR only
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^14.2.0

  # Local database
  drift: ^2.18.0
  sqlcipher_flutter_libs: ^0.5.5
  sqlite3: ^2.4.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  cloud_functions: ^5.0.0

  # Auth + security
  flutter_secure_storage: ^9.2.2
  local_auth: ^2.3.0

  # HTTP
  dio: ^5.6.0

  # Connectivity
  connectivity_plus: ^6.0.3

  # Charts
  fl_chart: ^0.69.0

  # Icons
  lucide_icons: ^0.253.0

  # Fonts
  google_fonts: ^6.2.1

  # URL launcher
  url_launcher: ^6.3.0

  # CSV export
  csv: ^6.0.0
  share_plus: ^10.0.0

  # Webview
  webview_flutter: ^4.8.0

  # Cryptography
  crypto: ^3.0.3

  # Background sync
  workmanager: ^0.6.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  drift_dev: ^2.18.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
